name: Build Immortalwrt-24.10-6.6_redmi-ax6000-ubootmod

on:
  workflow_dispatch:  # 手动触发（推荐）
    inputs:
      config_file:
        description: "选择配置文件"
        required: true
        default: "redmi-ax6000-24_10_6_6"
        type: choice
        options:
          - "redmi-ax6000-24_10_6_6"
          - "mt7986a-ax6000-ubootmod"
          - "ax6000_ubootmod"
      ssh_enabled:
        description: "是否开启 SSH"
        required: false
        default: false
        type: boolean
      ubootmod_patch:
        description: "是否应用 ubootmod 补丁"
        required: false
        default: false
        type: boolean

env:
  DIY_P1_SH: scripts/custom_feeds.sh
  DIY_P2_SH: scripts/custom_settings.sh
  TZ: Asia/Shanghai
  CONFIG_FILE: defconfig/${{ inputs.config_file }}.config
  FEEDS_CONF: feeds.conf.default
  REPO_SOURCE: chasey-dev/immortalwrt-mt798x-rebase
  REPO_BRANCH: openwrt-24.10-6.6

jobs:
  build:
    name: ImmortalWrt-24-10_6.6-Redmi-AX6000 Build ${{ github.sha }}
    runs-on: ubuntu-latest
    steps:

      - name: 输入参数
        run: |
          echo "输入参数："
          echo "  配置文件: ${CONFIG_FILE}"
          echo "  开启 SSH: ${{inputs.ssh_enabled}}"
          echo "  当前提交： ${{ github.sha }}"

      - name: Check out
        uses: actions/checkout@main
        with:
          fetch-depth: 1

      - name: Initialization Values
        id: commitversionmsg
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          TARGET_TITLE="[${SHORT_SHA}] - ${COMMIT_MSG}"
          echo "T_TITLE=$TARGET_TITLE" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "REPO_URL=https://github.com/${REPO_SOURCE}.git" >> $GITHUB_ENV
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y-%m-%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${REPO_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./$CONFIG_FILE)" >> $GITHUB_ENV

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo docker image prune --all --force
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android /opt/hostedtoolcache/CodeQL /opt/ghc /usr/local/share/powershell /usr/local/share/boost /usr/lib/jvm
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt -yqq purge azure-cli* docker* llvm* firefox google* powershell* mysql* php* snap*
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E timedatectl set-timezone "$TZ"
          
          sudo mkdir immortalwrt
          sudo chown $USER:$GROUPS immortalwrt
          
          # 添加 pnpm 依赖
          npm install -g pnpm
          
          echo "初始磁盘空间:"
          df -hT

          # Optimize Disk Space and Expand Swap
          sudo swapoff -a
          sudo dd if=/dev/zero of=/swapfile bs=1M count=10240
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Clone Code
        run: |
          git clone  -b ${REPO_BRANCH} --depth 1 --single-branch --filter=blob:none ${REPO_URL} immortalwrt

      - name: 应用 ubootmod 补丁
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ubootmod_patch }}
        run: |
          bash $GITHUB_WORKSPACE/scripts/apply_ubootmod_patches.sh
          echo "=== 当前 AX6000 DTS ==="
          cat immortalwrt/target/linux/mediatek/dts/mt7986a-xiaomi-redmi-router-ax6000-ubootmod.dts
          grep -A 30 "define Device/xiaomi_redmi-router-ax6000-ubootmod" immortalwrt/target/linux/mediatek/image/filogic.mk
      
      - name: Load config files
        run: |
          # [ -e files ] && rm -rf immortalwrt/files && cp -rf ./files immortalwrt/
          # [ -e $FEEDS_CONF ] && mv $FEEDS_CONF immortalwrt/feeds.conf.default
          [ -e $CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE immortalwrt/.config

      - name: Load custom feeds
        working-directory: immortalwrt
        run: |
          bash $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update & Install feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          

      - name: Load custom configuration
        working-directory: immortalwrt
        run: |
          rm -rf files
          bash $GITHUB_WORKSPACE/$DIY_P2_SH
      
      - name: SSH 连接（可选）
        uses: mxschmitt/action-tmate@v3.23
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ssh_enabled }}
        with:
          limit-access-to-actor: true

      - name: 加载 Redmi AX6000 配置
        working-directory: immortalwrt
        run: |
          make defconfig -j$(nproc) && make clean -j$(nproc)

      - name: 下载源码
        working-directory: immortalwrt
        run: |
          make download -j$(nproc) || {
            echo "首次下载失败，重试中..."
            make download -j1 || true
          }

      - name: 编译固件
        working-directory: immortalwrt
        run: |
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: 检查&整理编译产物
        if: success()
        working-directory: immortalwrt
        run: |
          echo "-----Machine Info------"
          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="
          echo "=== 编译产物列表 ==="
          find bin/targets/mediatek/filogic/ -type f \( -name "*.squashfs*" -o -name "*.bin" -o -name "*.sysupgrade" -o -name "*.itb" -o -name "*.ubi" -o -name "*.fip" \) 2>/dev/null || echo "未找到编译产物"
          rm -rf bin/targets/mediatek/filogic/packages 2>/dev/null || true
          rm -rf bin/targets/mediatek/filogic/*-bl2.bin
          cp .config bin/targets/mediatek/filogic/build.config 2>/dev/null || true

      - name: 上传编译产物
        if: success()
        uses: actions/upload-artifact@main
        continue-on-error: true
        with:
          name: ImmortalWrt-24-10-6-6-Redmi-AX6000-${{ env.WRT_DATE }}-${{ github.run_number }}-${{ steps.commitversionmsg.outputs.SHORT_SHA }}
          path: |
            immortalwrt/bin/targets/mediatek/filogic
          retention-days: 15
          if-no-files-found: warn
          compression-level: 9

      - name: 检查编译日志
        if: failure()
        working-directory: immortalwrt
        run: |
          echo "=== 编译失败，检查最后 200 行日志 ==="
          tail -100 build.log || true
          echo "=== build.log 中的 error/fatal 关键信息 ==="
          grep -niE "error:|fatal:|collect2:|Killed signal|No rule to make target|undefined reference" build.log | tail -50 || true
          echo "=== 最终 .config 中的 AX6000 设备 ==="
          grep "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_xiaomi_redmi-router-ax6000" .config || true
          echo "=== 当前编译目录 ==="
          ls -lh bin/targets/mediatek/filogic/ || true

      - name: 生成构建摘要
        if: success()
        run: |
          echo "## 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "- 构建源码: ${{ env.REPO_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- 源码分支: ${{ env.REPO_BRANCH }}" >> $GITHUB_STEP_SUMMARY
          echo "- 构建时间: ${{ env.WRT_DATE }}" >> $GITHUB_STEP_SUMMARY
          echo "- 构建版本: ${{ steps.commitversionmsg.outputs.T_TITLE }}" >> $GITHUB_STEP_SUMMARY
          echo "- 构建状态: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- 运行编号: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ -f immortalwrt/build.log ]; then
            echo "- 编译日志行数: $(wc -l < immortalwrt/build.log)" >> $GITHUB_STEP_SUMMARY
          fi