name: Build sing-box-ref1nd for OpenWrt aarch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-stable # ref1nd 增强分支

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Compile (Truly Static Musl)
        run: |
          # 启用 CGO 但使用 zig 作为编译器指向 musl
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=arm64
          export CC="zig cc -target aarch64-linux-musl"
          export CXX="zig ++ -target aarch64-linux-musl"

          # 编译标签
          TAGS="with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_gvisor,with_naive_outbound,with_purego"
          
          # 关键点：
          # 1. -linkmode external 强制使用外部链接器 (zig)
          # 2. -extldflags "-static" 强制全静态链接，不依赖任何 .so
          go build -v \
            -trimpath \
            -tags "$TAGS" \
            -ldflags "-s -w -buildid= -linkmode external -extldflags '-static' -X 'github.com/sagernet/sing-box/constant.Version=ref1nd-musl-static'" \
            -o sing-box-arm64 ./cmd/sing-box

      - name: Download libcronet
        run: |
          wget "https://github.com/SagerNet/cronet-go/releases/latest/download/libcronet-linux-arm64.so" -O libcronet.so

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-fixed-aarch64
          path: |
            sing-box-arm64
            libcronet.so
