name: Build sing-box-ref1nd for OpenWrt aarch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-stable
          fetch-depth: 0 # 必须设为 0 才能获取所有历史记录和标签以提取版本号

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.25.8'

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Prepare Version String
        id: prepare_version
        run: |
          # 1. 获取最新的 Git Tag (例如 1.11.0-alpha.10)
          # 2. 如果没有 Tag，则使用最新的 Commit Hash
          GIT_VERSION=$(git describe --tags --always)
          VERSION_STR="${GIT_VERSION}"
          echo "Building Version: $VERSION_STR"
          echo "VERSION=$VERSION_STR" >> $GITHUB_OUTPUT

      - name: Compile (Truly Static Musl)
        run: |
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=arm64
          export CC="zig cc -target aarch64-linux-musl"
          export CXX="zig ++ -target aarch64-linux-musl"

          TAGS="with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_gvisor,with_naive_outbound,with_purego"
          
          # 获取上面步骤生成的版本号
          VERSION_VAL="${{ steps.prepare_version.outputs.VERSION }}"
          
          # 注入版本号到 constant.Version
          go build -v \
            -trimpath \
            -tags "$TAGS" \
            -ldflags "-s -w -buildid= \
              -linkmode external \
              -extldflags '-static' \
              -X 'github.com/sagernet/sing-box/constant.Version=$VERSION_VAL'" \
            -o CrashCore ./cmd/sing-box

      - name: Download libcronet
        run: |
          wget "https://github.com/SagerNet/cronet-go/releases/latest/download/libcronet-linux-arm64.so" -O libcronet.so

      - name: Create Bundle (CrashCore.gz)
        run: |
          tar -cvzf CrashCore.tar.gz CrashCore libcronet.so

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-ref1nd-aarch64-${{ steps.prepare_version.outputs.VERSION }}
          path: CrashCore.tar.gz
