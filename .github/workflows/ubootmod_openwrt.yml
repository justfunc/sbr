name: Build Redmi AX6000 Stock + U-BootMod

on:
  workflow_dispatch:  # 手动触发（推荐）

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04  # OpenWrt 推荐版本，稳定性高
    steps:

      - name: Check out
        uses: actions/checkout@v6.0.2

      - name: 检出最新代码（padavanonly/immortalwrt-mt798x-6.6）
        uses: actions/checkout@v6.0.2
        with:
          repository: padavanonly/immortalwrt-mt798x-6.6
          ref: openwrt-24.10-6.6  # 当前活跃分支（内核 6.6）
          path: immortalwrt
          fetch-depth: 0

      - name: 安装编译环境依赖（官方 ImmortalWrt 脚本）
        run: |
          sudo apt-get update
          sudo bash -c "$(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)"
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"

      - name: 只覆盖 ubootmod 分区 DTS
        run: |
          bash scripts/apply_multi_version_patches.sh
          echo "=== 当前 AX6000 DTS ==="
          cat immortalwrt/target/linux/mediatek/dts/mt7986a-xiaomi-redmi-router-ax6000-ubootmod.dts
          grep -A 30 "define Device/xiaomi_redmi-router-ax6000-ubootmod" immortalwrt/target/linux/mediatek/image/filogic.mk
         

      - name: 缓存 dl/
        uses: actions/cache@v5.0.3
        id: cache-dl
        with:
          path: immortalwrt/dl
          key: ${{ runner.os }}-immortalwrt-dl-${{ hashFiles('immortalwrt/feeds.conf.default') }}

      - name: 更新 feeds 并安装
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载 Redmi AX6000 原仓库配置
        working-directory: immortalwrt
        run: |
          cat >> .config << 'EOF'
          CONFIG_CCACHE=y
          # CONFIG_BINUTILS_USE_VERSION_2_42 is not set
          CONFIG_BINUTILS_USE_VERSION_2_43=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_TARGET_PER_DEVICE_ROOTFS=y
          CONFIG_TARGET_MULTI_PROFILE=y
          EOF

          make defconfig

          cat .config
          
          echo "=== 配置验证 ==="
          grep "CONFIG_TARGET_MULTI_PROFILE=y" .config
          grep "CONFIG_TARGET_PER_DEVICE_ROOTFS=y" .config
          echo "=== 检查 DTS 文件 ==="
          ls -la target/linux/mediatek/dts/*ax6000*

      - name: 下载源码（加速后续编译）
        working-directory: immortalwrt
        run: |
          make download -j$(nproc) || true

      - name: 开始编译 stock + ubootmod 固件
        working-directory: immortalwrt
        run: |
          set -o pipefail
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: 检查编译产物
        working-directory: immortalwrt
        run: |
          echo "=== 编译产物列表 ==="
          find bin/targets/mediatek/filogic/ -type f \( -name "*.squashfs*" -o -name "*.bin" -o -name "*.sysupgrade" -o -name "*.itb" -o -name "*.ubi" -o -name "*.fip" \) 2>/dev/null || echo "未找到编译产物"
          echo "=== 检查 stock 和 ubootmod 固件 ==="
          ls -lh bin/targets/mediatek/filogic/*stock* 2>/dev/null || echo "stock 版本缺失"
          ls -lh bin/targets/mediatek/filogic/*ubootmod* 2>/dev/null || echo "ubootmod 版本缺失"
          stock_count=$(find bin/targets/mediatek/filogic/ -maxdepth 1 -type f -name "*stock*" | wc -l | tr -d ' ')
          ubootmod_count=$(find bin/targets/mediatek/filogic/ -maxdepth 1 -type f -name "*ubootmod*" | wc -l | tr -d ' ')
          echo "stock 固件数量: ${stock_count}"
          echo "ubootmod 固件数量: ${ubootmod_count}"
          test "${stock_count}" -gt 0
          test "${ubootmod_count}" -gt 0
          echo "=== 检查恢复镜像 ==="
          ls -lh bin/targets/mediatek/filogic/*recovery.itb 2>/dev/null || echo "recovery.itb 缺失"
          ls -lh bin/targets/mediatek/filogic/*initramfs-factory.ubi 2>/dev/null || echo "initramfs-factory.ubi 缺失"
          echo "=== 检查 FIP 文件 ==="
          ls -lh bin/targets/mediatek/filogic/*bl31-uboot.fip 2>/dev/null || echo "bl31-uboot.fip 缺失"
          echo "=== 检查内核文件 ==="
          ls -lh bin/targets/mediatek/filogic/*kernel* 2>/dev/null || echo "kernel 文件缺失"
          echo "=== 编译产物目录 ==="
          ls -lh bin/targets/mediatek/filogic/ || true

      - name: 上传编译产物（stock + ubootmod）
        if: success()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ImmortalWrt-Redmi-AX6000-${{ github.run_number }}
          path: |
            immortalwrt/bin/targets/mediatek/filogic/*squashfs*
            immortalwrt/bin/targets/mediatek/filogic/*recovery.itb
            immortalwrt/bin/targets/mediatek/filogic/*initramfs-factory.ubi
            immortalwrt/bin/targets/mediatek/filogic/*bl31-uboot.fip
            immortalwrt/bin/targets/mediatek/filogic/*preloader.bin
            immortalwrt/bin/targets/mediatek/filogic/*kernel*
            immortalwrt/bin/targets/mediatek/filogic/*.manifest
          retention-days: 30
          if-no-files-found: warn

      - name: 检查编译日志
        if: failure()
        working-directory: immortalwrt
        run: |
          echo "=== 编译失败，检查最后 200 行日志 ==="
          tail -200 build.log || true
          echo "=== build.log 中的 error/fatal 关键信息 ==="
          grep -niE "error:|fatal:|collect2:|Killed signal|No rule to make target|undefined reference" build.log | tail -50 || true
          echo "=== 最终 .config 中的 AX6000 设备 ==="
          grep "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_xiaomi_redmi-router-ax6000" .config || true
          echo "=== 当前编译目录 ==="
          ls -lh bin/targets/mediatek/filogic/ || true

      - name: 清理缓存（可选，节省空间）
        if: always()
        working-directory: immortalwrt
        run: |
          rm -rf staging_dir/build_dir || true
          rm -rf tmp || true
