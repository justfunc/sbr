name: Build ubootmod-standard-Version Redmi AX6000

on:
  workflow_dispatch:  # 手动触发（推荐）

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04  # OpenWrt 推荐版本，稳定性高
    steps:

      - name: Check out
        uses: actions/checkout@v6.0.2

      - name: 检出最新代码（padavanonly/immortalwrt-mt798x-6.6）
        uses: actions/checkout@v6.0.2
        with:
          repository: padavanonly/immortalwrt-mt798x-6.6
          ref: openwrt-24.10-6.6  # 当前活跃分支（内核 6.6）
          path: immortalwrt
          fetch-depth: 0

      - name: 安装编译环境依赖（官方 ImmortalWrt 脚本）
        run: |
          sudo apt-get update
          sudo bash -c "$(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)"
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"

      - name: 复制配置文件
        run: |
          cp target/linux/mediatek/dts/mt7986a-xiaomi-redmi-router-ax6000-ubootmod-standard.dts immortalwrt/target/linux/mediatek/dts/mt7986a-xiaomi-redmi-router-ax6000-ubootmod.dts
          # bash scripts/apply_multi_version_patches.sh
          # cp defconfig/mt7986a-ax6000-ubootmod.config immortalwrt/.config

      - name: 缓存 dl/
        uses: actions/cache@v5.0.3
        id: cache-dl
        with:
          path: immortalwrt/dl
          key: ${{ runner.os }}-immortalwrt-dl-${{ hashFiles('immortalwrt/feeds.conf.default') }}-${{ hashFiles('defconfig/mt7986a-ax6000-ubootmod.config') }}

      - name: 更新 feeds 并安装
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 缓存 staging_dir/
        uses: actions/cache@v5.0.3
        id: cache-staging
        with:
          path: immortalwrt/staging_dir
          key: ${{ runner.os }}-immortalwrt-staging-${{ hashFiles('immortalwrt/feeds.conf.default') }}-${{ hashFiles('defconfig/mt7986a-ax6000-ubootmod.config') }}

      - name: 加载 Redmi AX6000 U-Boot 版本配置（ubootmod）
        working-directory: immortalwrt
        run: |
          cp defconfig/mt7986-ax6000.config .config
          echo "CONFIG_CCACHE=y" >> .config
          make defconfig
          echo "=== 配置验证 ==="
          grep "CONFIG_TARGET_mediatek_filogic_DEVICE_xiaomi_redmi-router-ax6000" .config
          echo "=== 编译目标检查 ==="
          grep "CONFIG_TARGET_ROOTFS_SQUASHFS" .config || echo "警告: 未启用 squashfs"
          grep "CONFIG_TARGET_INITRAMFS_COMPRESSION_XZ" .config || echo "警告: 未启用 xz 压缩"
          echo "=== 检查多设备配置 ==="
          grep "CONFIG_TARGET_MULTI_PROFILE" .config
          grep "CONFIG_TARGET_PER_DEVICE_ROOTFS" .config
          echo "=== 检查启用的设备 ==="
          grep "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_xiaomi_redmi-router-ax6000" .config | grep "=y"
          echo "=== 检查 DTS 文件 ==="
          ls -la target/linux/mediatek/dts/*ax6000*

      - name: 下载源码（加速后续编译）
        working-directory: immortalwrt
        run: |
          make download -j$(nproc) || true

      - name: 开始编译（U-Boot mod 固件）
        working-directory: immortalwrt
        run: make -j$(nproc) V=s 2>&1 | tee build.log

      - name: 检查编译产物
        working-directory: immortalwrt
        run: |
          echo "=== 编译产物列表 ==="
          find bin/targets/mediatek/filogic/ -type f \( -name "*.squashfs*" -o -name "*.bin" -o -name "*.sysupgrade" -o -name "*.itb" -o -name "*.ubi" -o -name "*.fip" \) 2>/dev/null || echo "未找到编译产物"
          echo "=== 检查三个版本的固件 ==="
          ls -lh bin/targets/mediatek/filogic/*stock* 2>/dev/null || echo "stock 版本缺失"
          ls -lh bin/targets/mediatek/filogic/*ubootmod.bin 2>/dev/null || echo "ubootmod 版本缺失"
          ls -lh bin/targets/mediatek/filogic/*ubootmod-standard.bin 2>/dev/null || echo "ubootmod-standard 版本缺失"
          echo "=== 检查恢复镜像 ==="
          ls -lh bin/targets/mediatek/filogic/*recovery.itb 2>/dev/null || echo "recovery.itb 缺失"
          ls -lh bin/targets/mediatek/filogic/*initramfs-factory.ubi 2>/dev/null || echo "initramfs-factory.ubi 缺失"
          echo "=== 检查 FIP 文件 ==="
          ls -lh bin/targets/mediatek/filogic/*bl31-uboot.fip 2>/dev/null || echo "bl31-uboot.fip 缺失"
          echo "=== 检查内核文件 ==="
          ls -lh bin/targets/mediatek/filogic/*kernel* 2>/dev/null || echo "kernel 文件缺失"
          echo "=== 编译产物目录 ==="
          ls -lh bin/targets/mediatek/filogic/ || true

      - name: 上传编译产物（U-Boot 版本固件）
        if: success()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ImmortalWrt-Redmi-AX6000-UbootMod-${{ github.run_number }}
          path: |
            immortalwrt/bin/targets/mediatek/filogic/*squashfs*
            immortalwrt/bin/targets/mediatek/filogic/*recovery.itb
            immortalwrt/bin/targets/mediatek/filogic/*initramfs-factory.ubi
            immortalwrt/bin/targets/mediatek/filogic/*bl31-uboot.fip
            immortalwrt/bin/targets/mediatek/filogic/*preloader.bin
            immortalwrt/bin/targets/mediatek/filogic/*kernel*
            immortalwrt/bin/targets/mediatek/filogic/*.manifest
          retention-days: 30
          if-no-files-found: warn

      - name: 检查编译日志
        if: failure()
        working-directory: immortalwrt
        run: |
          echo "=== 编译失败，检查最后 100 行日志 ==="
          tail -100 build.log

      - name: 清理缓存（可选，节省空间）
        if: always()
        working-directory: immortalwrt
        run: |
          rm -rf staging_dir/build_dir || true
          rm -rf tmp || true
