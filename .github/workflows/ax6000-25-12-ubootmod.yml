name: Immortalwrt-25.12_redmi-ax6000-ubootmod Build
run-name: "ImmortalWrt-25-12-6-12-Redmi-AX6000-Build ${{ github.actor }} | ${{ github.sha }}"

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: "选择配置文件"
        required: true
        default: redmi-ax6000-25_12
        type: choice
        options:
          - redmi-ax6000-25_12
          - mt7986-ax6000-immortalwrt-25-12
          - ax6000-immortalwrt-25-12
          - ax6000_immortalwrt_uboot_25_12
      ssh_enabled:
        description: "是否开启 SSH"
        required: false
        default: false
        type: boolean
      diy-part1_sh:
        description: "自定义添加源"
        required: false
        type: choice
        options:
          - none
          - custom_feeds_25_12

env:
  DIY_P2_SH: scripts/custom_settings_25_12.sh
  TZ: Asia/Shanghai
  CONFIG_FILE: defconfig/${{ github.event.inputs.config_file }}.config
  FEEDS_CONF: 25-12-feeds.conf
  REPO_URL: https://github.com/chasey-dev/immortalwrt-mt798x-rebase.git
  REPO_BRANCH: 25.12

jobs:
  build:
    name: ImmortalWrt-25-12-6-12-Redmi-AX6000 Build ${{ github.sha }}
    runs-on: ubuntu-latest
    steps:

      - name: 输入参数
        run: |
          echo "输入参数："
          echo "  配置文件: ${CONFIG_FILE}"
          echo "  开启 SSH: ${{inputs.ssh_enabled}}"
          echo "  当前提交： ${{ github.sha }}"

      - name: Check out
        uses: actions/checkout@main
        with:
          fetch-depth: 1
      
      # 动态提取并修改当前运行的名称
      - name: Dynamically Update Run Title
        id: commitversionmsg
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          TARGET_TITLE="[${SHORT_SHA}] - ${COMMIT_MSG}"
          echo "T_TITLE=$TARGET_TITLE" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: "Current version: ${{ steps.commitversionmsg.outputs.T_TITLE }}"
        run: |
          echo "当前版本：${{ steps.commitversionmsg.outputs.T_TITLE }}"

      - name: 安装编译环境依赖（官方 ImmortalWrt 脚本）
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo docker image prune --all --force
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android /opt/hostedtoolcache/CodeQL /opt/ghc /usr/local/share/powershell /usr/local/share/boost /usr/lib/jvm
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt -yqq purge azure-cli* docker* llvm* firefox google* powershell* mysql* php* snap*
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E systemctl daemon-reload
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E timedatectl set-timezone "$TZ"
          
          sudo mkdir immortalwrt
          sudo chown $USER:$GROUPS immortalwrt
          
          # 添加 pnpm 依赖
          npm install -g pnpm
          
          echo "初始磁盘空间:"
          df -hT

      - name: Optimize Disk Space and Expand Swap
        run: |
          sudo swapoff -a
          sudo dd if=/dev/zero of=/swapfile bs=1M count=10240
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: 检出最新代码
        run: |
          git clone --depth 1 --single-branch --filter=blob:none -b $REPO_BRANCH $REPO_URL immortalwrt

          cd ./immortalwrt
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE ./.config
          # [ -e $FEEDS_CONF ] && mv $FEEDS_CONF ./feeds.conf.default

          # 如果不存在 defconfig 则直接结束工作流
          if [ ! -d "defconfig" ]; then
            echo "defconfig directory not found, stopping workflow."
            exit 0
          fi

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi
          
      - name: 更新 feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
  
      - name: 安装 feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds install -a

      - name: Custom Packages
        working-directory: immortalwrt
        if: ${{ github.event.inputs.diy-part1_sh != 'none' }}
        run: |
          bash $GITHUB_WORKSPACE/scripts/${{ github.event.inputs.diy-part1_sh }}.sh

      - name: Load custom configuration （加载自定义配置 custom_settings.sh）
        working-directory: immortalwrt
        run: |
          bash $GITHUB_WORKSPACE/$DIY_P2_SH
      
      - name: SSH 连接（可选）
        uses: mxschmitt/action-tmate@v3.23
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ssh_enabled }}
        with:
          limit-access-to-actor: true

      - name: 加载 Redmi AX6000 原仓库配置
        working-directory: immortalwrt
        run: |
          make defconfig -j$(nproc) && make clean -j$(nproc)

      - name: 下载源码（加速后续编译）
        working-directory: immortalwrt
        run: |
          make download -j$(nproc) || {
            echo "首次下载失败，重试中..."
            make download -j1 || true
          }

      - name: 编译固件
        working-directory: immortalwrt
        run: |
          BUILD_THREADS=$(nproc)
          echo "Using $BUILD_THREADS threads"

          echo "========================================="
          echo "🚀 正在启动 25.12 架构多线程并行编译..."
          echo "========================================="

          make -j$BUILD_THREADS V=s 2>&1 | tee build.log

      - name: 检查编译产物
        working-directory: immortalwrt
        run: |
          echo "=== 编译产物列表 ==="
          find bin/targets/mediatek/filogic/ -type f \( -name "*.squashfs*" -o -name "*.bin" -o -name "*.sysupgrade" -o -name "*.itb" -o -name "*.ubi" -o -name "*.fip" \) 2>/dev/null || echo "未找到编译产物"
          echo "=== 检查固件 ==="
          ls -lh bin/targets/mediatek/filogic/*ubootmod* 2>/dev/null || echo "ubootmod 版本缺失"
          ubootmod_count=$(find bin/targets/mediatek/filogic/ -maxdepth 1 -type f -name "*ubootmod*" | wc -l | tr -d ' ')
          echo "ubootmod 固件数量: ${ubootmod_count}"
          rm -rf bin/packages
          rm -rf bin/targets/mediatek/filogic/packages
          cp .config bin/targets/mediatek/filogic/build.config

      - name: 上传编译产物
        uses: actions/upload-artifact@main
        with:
          name: ImmortalWrt-25-12-6-12-Redmi-AX6000-${{ github.run_number }}
          path: |
            immortalwrt/bin/targets/mediatek/filogic
          retention-days: 15
          if-no-files-found: warn
          compression-level: 6

      - name: 检查编译日志
        if: failure()
        working-directory: immortalwrt
        run: |
          echo "=== 编译失败，检查最后 200 行日
          tail -200 build.log || true
          echo "=== build.log 中的 error/fatal 关键信息 ==="
          grep -niE "error:|fatal:|collect2:|Killed signal|No rule to make target|undefined reference" build.log | tail -50 || true
          echo "=== 最终 .config 中的 AX6000 设备 ==="
          grep "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_xiaomi_redmi-router-ax6000" .config || true
          echo "=== 当前编译目录 ==="
          ls -lh bin/targets/mediatek/filogic/ || true

      - name: 生成构建摘要
        if: always()
        run: |
          echo "## 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "- 构建版本: ${{ steps.commitversionmsg.outputs.T_TITLE }}" >> $GITHUB_STEP_SUMMARY
          echo "- 构建状态: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- 运行编号: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ -f immortalwrt/build.log ]; then
            echo "- 编译日志行数: $(wc -l < immortalwrt/build.log)" >> $GITHUB_STEP_SUMMARY
          fi